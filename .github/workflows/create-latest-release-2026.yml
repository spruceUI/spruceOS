name: Create NEW Latest Release (2026rev.)

on:
  workflow_dispatch:

jobs:
  create-latest-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install 7zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Read version from spruce/spruce
        id: get_version
        run: |
          if [ ! -f "spruce/spruce" ]; then
            echo "Error: spruce/spruce file not found"
            exit 1
          fi
          VERSION="$(< spruce/spruce)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

      - name: Recombine split files
        run: |
          # Miyoo rootfs
          if ls spruce/flip/miyoo355_rootfs_32.img_part* 1>/dev/null 2>&1; then
            echo "Recombining miyoo355_rootfs_32.img..."
            rm -f spruce/flip/miyoo355_rootfs_32.img
            cat spruce/flip/miyoo355_rootfs_32.img_part* > spruce/flip/miyoo355_rootfs_32.img
            rm -f spruce/flip/miyoo355_rootfs_32.img_part*
            echo "✓ miyoo355_rootfs_32.img recombined"
          fi

          # muOS pixie
          if ls spruce/flip/muOS-pixie-reduced.sqsh-part* 1>/dev/null 2>&1; then
            echo "Recombining muOS-pixie-reduced.sqsh..."
            rm -f spruce/flip/muOS-pixie-reduced.sqsh
            cat spruce/flip/muOS-pixie-reduced.sqsh-part* > spruce/flip/muOS-pixie-reduced.sqsh
            rm -f spruce/flip/muOS-pixie-reduced.sqsh-part*
            echo "✓ muOS-pixie-reduced.sqsh recombined"
          fi

          # ScummVM libretro core
          if ls RetroArch/.retroarch/cores64/scummvm_libretro.so.part* 1>/dev/null 2>&1; then
            echo "Recombining scummvm_libretro.so..."
            cat RetroArch/.retroarch/cores64/scummvm_libretro.so.part* > RetroArch/.retroarch/cores64/scummvm_libretro.so
            rm -f RetroArch/.retroarch/cores64/scummvm_libretro.so.part*
            echo "✓ scummvm_libretro.so recombined"
          fi

      - name: Pull PyUI Themes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p Themes
          RELEASE_URL="https://github.com/spruceUI/PyUI-Themes/releases/download/1"

          echo "Downloading selected themes from PyUI-Themes release..."
          wget -q --no-check-certificate -O "Themes/ALEKFULL_NX_ES.7z" "${RELEASE_URL}/ALEKFULL_NX_ES.7z" || true
          wget -q --no-check-certificate -O "Themes/ART_BOOK_OUTLINE.7z" "${RELEASE_URL}/ART_BOOK_OUTLINE.7z" || true
          wget -q --no-check-certificate -O "Themes/ART_BOOK_NEXT.7z" "${RELEASE_URL}/ART_BOOK_NEXT.7z" || true
          wget -q --no-check-certificate -O "Themes/Avocado.7z" "${RELEASE_URL}/Avocado.7z" || true
          wget -q --no-check-certificate -O "Themes/Cosy by KyleBing.7z" "${RELEASE_URL}/Cosy_by_KyleBing.7z" || true
          wget -q --no-check-certificate -O "Themes/Grape.7z" "${RELEASE_URL}/Grape.7z" || true
          wget -q --no-check-certificate -O "Themes/GREEN.7z" "${RELEASE_URL}/GREEN.7z" || true
          wget -q --no-check-certificate -O "Themes/HeyDW's Blue.7z" "${RELEASE_URL}/HeyDWs_Blue.7z" || true
          wget -q --no-check-certificate -O "Themes/M.7z" "${RELEASE_URL}/M.7z" || true
          wget -q --no-check-certificate -O "Themes/MINIMAL.7z" "${RELEASE_URL}/MINIMAL.7z" || true
          wget -q --no-check-certificate -O "Themes/MinUInspired (logos).7z" "${RELEASE_URL}/MinUInspired_(logos).7z" || true
          wget -q --no-check-certificate -O "Themes/OTB.7z" "${RELEASE_URL}/OTB.7z" || true
          wget -q --no-check-certificate -O "Themes/Pico-8.7z" "${RELEASE_URL}/Pico-8.7z" || true
          wget -q --no-check-certificate -O "Themes/SLABS.7z" "${RELEASE_URL}/SLABS.7z" || true
          wget -q --no-check-certificate -O "Themes/SPRUCE (simple).7z" "${RELEASE_URL}/SPRUCE_(simple).7z" || true

          # Remove any empty files from failed downloads
          find Themes -name "*.7z" -empty -delete

          echo "Themes downloaded:"
          ls -lh Themes

      - name: Create 7z archive
        run: |
          7z a -t7z -m0=lzma2:d=16m -mx=7 -ms=off -mf- "spruceV${{ steps.get_version.outputs.version }}.7z" * .tmp_update \
            -xr!.git \
            -xr!.github \
            -x!.gitignore \
            -x!.gitattributes \
            -x!create_spruce_release.bat \
            -x!create_spruce_release.sh \
            -x!spruce/flags/developer_mode \
            -xr!App/adbd \
            -x!To-Do.txt

          echo "Archive created: spruceV${{ steps.get_version.outputs.version }}.7z"
          ls -lh "spruceV${{ steps.get_version.outputs.version }}.7z"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if gh release view "v${{ steps.get_version.outputs.version }}" --repo spruceUI/spruceOS >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.get_version.outputs.version }} already exists, will update archive only"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.get_version.outputs.version }} does not exist, will create new draft"
          fi

      - name: Update existing release archive
        if: steps.check_release.outputs.exists == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: spruceV${{ steps.get_version.outputs.version }}.7z
          tag_name: v${{ steps.get_version.outputs.version }}
          repository: spruceUI/spruceOS
          token: ${{ secrets.PAT_TOKEN }}
          draft: true
          prerelease: false

      - name: Create new draft release
        if: steps.check_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: spruceV${{ steps.get_version.outputs.version }}.7z
          tag_name: v${{ steps.get_version.outputs.version }}
          name: spruceOS v${{ steps.get_version.outputs.version }}
          body: |
            | Device                | Support Status        |
            |-----------------------|-----------------------|
            | Miyoo Flip            |  |
            | Miyoo A30             |  |
            | Trimui Smart Pro      |  |
            | Trimui Brick          |  |
            | Trimui Smart Pro S    |  |
            | Miyoo Mini Flip       |  |
            | Miyoo Mini Plus       |  |
            | Miyoo Mini v1-4       |  |

            # What's New

            Check out the wiki for info on ROM folders and apps [Here](https://github.com/spruceUI/spruceOS/wiki)

            Join our Discord [here!](https://discord.gg/sDeaS3TMuJ)

            # Changelog

            ## Bug Fixes
            -

            ## Improvements
            -

            ## Installation
            ## New Installer App
            - Try the all-in-one installer app for a super easy installation!
            - No need to download a release or format your card manually!
            - Compatible versions for Windows, Mac and Linux!
            - [Find the Latest version for you PC here](https://github.com/spruceUI/spruceOS-Installer/releases/latest)
            - Lets you install Stable, Nightlies, Sprig (mini flip only) and Twig (GKD Pixel 2 only) all in one click!

            ## Manual Installation
            - Download spruceV${{ steps.get_version.outputs.version }}.7z
            - Extract onto your PC using [7zip](https://www.7-zip.org/download.html)
            - Copy the entire contents to a blank FAT32 formatted SD card.
            - Seriously, use 7zip to extract onto your PC THEN copy the files. IDK why but Windows breaks stuff if you use its built in extraction tool.
          repository: spruceUI/spruceOS
          token: ${{ secrets.PAT_TOKEN }}
          draft: true
          prerelease: false

      - name: Summary
        run: |
          echo "=========================================="
          echo "✓ Draft release created successfully!"
          echo "=========================================="
          echo "Version: ${{ steps.get_version.outputs.version }}"
          echo "Tag: v${{ steps.get_version.outputs.version }}"
          echo "File: spruceV${{ steps.get_version.outputs.version }}.7z"
          echo ""
          echo "Next steps:"
          echo "1. Review the draft release in GitHub UI"
          echo "2. Edit the release notes"
          echo "3. Publish the release"
          echo "4. OTA files will auto-update via update-ota-on-publish.yml"
          echo "=========================================="
