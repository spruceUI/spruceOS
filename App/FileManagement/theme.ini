# theme.ini — named theme presets for vTree
# ---------------------------------------------------------------------------
# Each section [Theme.Name] defines one preset.  The name after the dot is
# what appears in the Settings menu and what you write in config.ini under
# [ActiveTheme] → ActiveTheme=<n>.
#
# Colors: #RRGGBB (fully opaque) or #RRGGBBAA (with alpha, FF=opaque).
#
# ── Explorer / UI colours ───────────────────────────────────────────────────
#   Bg            — main background
#   AltBg         — alternating row tint
#   HeaderBg      — header / footer bar background
#   Text          — primary text
#   TextDisabled  — dimmed / inactive text
#   HighlightBg   — selected row / cursor background
#   HighlightText — text colour on the selected row
#   MarkedText    — marked files, offset labels, accent text
#   MenuBg        — context menu / dialog background (supports alpha)
#   MenuBorder    — context menu / dialog border
#
# ── Hex viewer byte-category colours (all optional) ─────────────────────────
#   HexZero       — 0x00 null bytes
#   HexCtrl       — 0x01–0x1F control codes
#   HexSpace      — 0x20 space
#   HexPunct      — punctuation / symbols
#   HexDigit      — 0x30–0x39 ASCII digits
#   HexLetter     — A–Z a–z ASCII letters
#   HexHigh       — 0x80–0xFE high / non-ASCII bytes
#   HexFull       — 0xFF all-ones byte
#
# The cursor byte always uses HighlightBg (so it matches the selection colour).
# Omitted hex keys fall back to the built-in Dark defaults.
# ---------------------------------------------------------------------------

