[General]
ShowHidden=true
RememberDirs=false
ExecScripts=false
SinglePane=false
TintIcons=true
Language=English

[Display]
ScreenWidth=0
ScreenHeight=0
Rotation=0
FontSizeList=18
FontSizeHeader=18
FontSizeFooter=18
FontSizeMenu=18
FontSizeHex=16
FontFile=nunwen.ttf

[Paths]
StartDirectoryLeft=/mnt/SDCARD
StartDirectoryRight=/mnt/SDCARD
# Path to gamecontrollerdb.txt; leave blank to search next to the executable.
GameControllerDB=/usr/lib/gamecontrollerdb.txt

[Keys]
# Physical-A (east) is SDL 'b' on Nintendo-labelled handhelds; swap confirm/back.
KeyConfirm=b
KeyBack=a
KeyMenu=y
KeyMark=back
KeyPgUp=leftshoulder
KeyPgDn=rightshoulder

[OskKeys]
OskKeyType=a
OskKeyBksp=x
OskKeyShift=y
OskKeyCancel=b
OskKeyToggle=back
OskKeyIns=start

[ActiveTheme]
ActiveTheme=Spruce

[FileTypes]
ExtraImageExts=
ExtraTextExts=.inf
